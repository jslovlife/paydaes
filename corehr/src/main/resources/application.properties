spring.application.name=corehr
server.port=8082

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# need this else hibernate will try getConnection() on startup, kena error with our dummy datasource
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# hikari pool settings per tenant, tune based on traffic
corehr.tenant.pool.maximum-pool-size=5
corehr.tenant.pool.minimum-idle=0
corehr.tenant.pool.connection-timeout-ms=30000
corehr.tenant.pool.idle-timeout-ms=600000
corehr.tenant.pool.keepalive-time-ms=120000
corehr.tenant.pool.cache-ttl-seconds=1800

tms.service.url=http://localhost:8081

corehr.rest-template.connect-timeout-ms=5000
corehr.rest-template.read-timeout-ms=10000

logging.level.com.paydaes.corehr=DEBUG
logging.level.org.springframework.web=DEBUG
