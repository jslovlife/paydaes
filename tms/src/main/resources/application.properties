# TMS Application Configuration
spring.application.name=tms
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=paydaes
spring.datasource.password=paydaes123

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.paydaes.tms=DEBUG
logging.level.org.springframework.web=DEBUG
